# keyboard
repeat_rate=25
repeat_delay=300
numlockon=1
xkb_rules_layout=fr
xkb_rules_variant=oss

# Misc
xwayland_persistence=1
syncobj_enable=0
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
circle_layout=tile,scroller,dwindle
enable_floating_snap=1
snap_distance=50
cursor_size=24
cursor_theme=Breeze_Light
cursor_hide_timeout=0
drag_tile_to_tile=1
single_scratchpad = 1

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=1
ov_no_resize=1
overviewgappi=5
overviewgappo=30

# Tags
tagrule=id:1,no_hide:1
tagrule=id:2,no_hide:1
tagrule=id:3,no_hide:1

source=~/.config/mango/animations.conf
source=~/.config/mango/appearance.conf
source=~/.config/mango/bind.conf
source=~/.config/mango/layouts.conf
source=~/.config/mango/monitor.conf
source=~/.config/mango/rule.conf

exec-once=~/.config/mango/autostart.sh
