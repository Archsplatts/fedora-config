## Catppuccin Colors
# target                 title     bg    text   indicator  border
client.focused           $lavender $base $text  $lavender  $lavender
client.focused_inactive  $overlay0 $base $text  $lavender  $overlay0
client.unfocused         $overlay0 $base $text  $lavender  $overlay0
client.urgent            $peach	   $base $peach $overlay0  $peach
client.placeholder       $overlay0 $base $text  $overlay0  $overlay0
client.background        $base

# Gnome Theme
set $gnome-schema org.gnome.desktop.interface

exec_always {
    gsettings set $gnome-schema gtk-theme 'Catppuccin-Frappe-Lavender'
    gsettings set $gnome-schema icon-theme 'Papirus-Dark'
    gsettings set $gnome-schema font-name 'Ubuntu Regular 11'
    gsettings set org.gnome.desktop.interface color-scheme prefer-dark   
} 
